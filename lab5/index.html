<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Лабораторная работа №5. Учёт личных финансов</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Учёт личных финансов</h1>

  <!-- Форма добавления транзакции -->
  <form id="transaction-form">

    <label for="amount">Сумма (положительная - доход, отрицательная - расход):</label>
    <input type="text" id="amount" placeholder="Например: 500 или -200" />

    <label for="category">Категория:</label>
    <select id="category">
      <option value="">Выберите категорию...</option>
      <option value="Зарплата">Зарплата</option>
      <option value="Продукты">Продукты</option>
      <option value="Транспорт">Транспорт</option>
      <option value="Развлечения">Развлечения</option>
      <option value="Коммунальные услуги">Коммунальные услуги</option>
      <option value="Здоровье">Здоровье</option>
      <option value="Другое">Другое</option>
    </select>

    <label for="description">Описание:</label>
    <textarea id="description" rows="2" placeholder="Введите описание транзакции"></textarea>

    <!-- Сообщение об ошибке валидации -->
    <p id="form-error"></p>

    <button type="submit">Добавить транзакцию</button>

  </form>

  <!-- Общая сумма -->
  <p id="total">Общий баланс: 0.00</p>

  <!-- Таблица транзакций -->
  <table id="transactions-table">
    <thead>
      <tr>
        <th>Дата и время</th>
        <th>Категория</th>
        <th>Описание</th>
        <th>Действие</th>
      </tr>
    </thead>
    <tbody>
      <!-- добавление строк через JavaScript -->
    </tbody>
  </table>

  <!-- описание транзакции -->
  <div id="transaction-details">
    Кликните на строку таблицы, чтобы увидеть подробности транзакции
  </div>

  <!-- Подключение главного модуля -->
  <script src="src/index.js" type="module"></script>

</body>
</html>
